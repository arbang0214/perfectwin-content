<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PerfecTwin Content Engine</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ─── Sidebar ─────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-title">PerfecTwin <span>Content</span></div>
      <div class="logo-sub">마케팅 콘텐츠 자동화 엔진</div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-nav-label">메뉴</div>
      <a class="nav-item" data-page="#generate" href="#generate">
        <span class="nav-icon">✏️</span>
        <span>콘텐츠 생성</span>
      </a>
      <a class="nav-item" data-page="#dashboard" href="#dashboard">
        <span class="nav-icon">📊</span>
        <span>발행 대시보드</span>
        <span class="nav-badge">준비 중</span>
      </a>
      <a class="nav-item" data-page="#topics" href="#topics">
        <span class="nav-icon">📋</span>
        <span>주제 관리</span>
        <span class="nav-badge">준비 중</span>
      </a>
    </nav>

    <div class="sidebar-recent">
      <div class="sidebar-recent-label">최근 생성</div>
      <div id="sidebarRecentWeeks"></div>
    </div>
  </aside>

  <!-- ─── Main content ─────────────────────────────── -->
  <main class="main-content" id="mainContent">
    <!-- Pages are rendered here by app.js -->
  </main>

  <!-- ─── Global Modal ─────────────────────────────── -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">파일 미리보기</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-tabs" id="modalTabs" style="display:none">
        <button class="modal-tab active" data-tab="preview">미리보기</button>
        <button class="modal-tab" data-tab="raw">원문</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
