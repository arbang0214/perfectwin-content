name: 월간 성과 리포트

on:
  schedule:
    # 매월 28~31일 오전 8:43 KST = 27~30일 23:43 UTC — 정시 큐 폭주 회피
    # 스크립트 내에서 실제 월말(KST 기준)인지 확인
    - cron: '43 23 27-30 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monthly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Google 서비스 계정 키 생성
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > config/perfectwin-monitoring-b8809c36eda2.json

      - name: 월간 리포트 실행
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY: config/perfectwin-monitoring-b8809c36eda2.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          INBLOG_API_KEY: ${{ secrets.INBLOG_API_KEY }}
          INBLOG_BLOG_SUBDOMAIN: ${{ secrets.INBLOG_BLOG_SUBDOMAIN }}
          INBLOG_BLOG_URL: ${{ secrets.INBLOG_BLOG_URL }}
          INBLOG_KO_API_KEY: ${{ secrets.INBLOG_KO_API_KEY }}
          INBLOG_KO_BLOG_SUBDOMAIN: ${{ secrets.INBLOG_KO_BLOG_SUBDOMAIN }}
          INBLOG_KO_BLOG_URL: ${{ secrets.INBLOG_KO_BLOG_URL }}
        run: node monitoring/monthly-report.js

      - name: 데이터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/monitoring/
          if git diff --cached --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
          else
            git commit -m "chore: monthly report $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
