name: 일간 성과 리포트

on:
  schedule:
    # 매일 오전 8:43 KST = 23:43 UTC (전날) — 정시 큐 폭주 회피
    - cron: '43 23 * * *'
    # 백업: UTC 자정 윈도우 밖 — KST 11:17 (첫 cron이 GH Actions에서 skip된 경우 대비)
    # --skip-if-exists로 첫 cron 성공 시 자동 종료, 실패 시에만 발송됨
    - cron: '17 2 * * *'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Google 서비스 계정 키 생성
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > config/perfectwin-monitoring-b8809c36eda2.json

      - name: 일간 리포트 실행
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY: config/perfectwin-monitoring-b8809c36eda2.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          INBLOG_API_KEY: ${{ secrets.INBLOG_API_KEY }}
          INBLOG_BLOG_SUBDOMAIN: ${{ secrets.INBLOG_BLOG_SUBDOMAIN }}
          INBLOG_BLOG_URL: ${{ secrets.INBLOG_BLOG_URL }}
          INBLOG_KO_API_KEY: ${{ secrets.INBLOG_KO_API_KEY }}
          INBLOG_KO_BLOG_SUBDOMAIN: ${{ secrets.INBLOG_KO_BLOG_SUBDOMAIN }}
          INBLOG_KO_BLOG_URL: ${{ secrets.INBLOG_KO_BLOG_URL }}
          BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
        run: |
          npx playwright install chromium --with-deps
          if [ "${{ github.event_name }}" = "schedule" ]; then
            node monitoring/daily-report.js --skip-if-exists
          else
            node monitoring/daily-report.js
          fi

      - name: 데이터 커밋 (스냅샷 + 리포트)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/monitoring/ dashboard/data.json
          if git diff --cached --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
          else
            git commit -m "chore: daily report $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
